name: release-binaries

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: darwin-arm64
            runner: macos-14
            smoke: true
          - label: darwin-x64
            runner: macos-13
            smoke: true
          - label: linux-x64
            runner: ubuntu-latest
            smoke: true
          - label: linux-arm64
            runner: ubuntu-latest
            smoke: false # built on x64 host, can't natively execute

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build bundle
        run: npm run build

      - name: Build standalone binary
        run: node scripts/build-binaries.mjs ${{ matrix.label }}

      - name: Verify binary size + version (skip for non-native arch)
        if: matrix.smoke == true
        run: |
          binary="dist-binaries/foreman-${{ matrix.label }}"
          test -x "$binary"
          size_mb=$(stat -f%z "$binary" 2>/dev/null || stat -c%s "$binary")
          size_mb=$((size_mb / 1024 / 1024))
          echo "binary size: ${size_mb} MB"
          test "$size_mb" -lt 80
          "$binary" --version | tee version.out
          grep -E "^[0-9]+\.[0-9]+\.[0-9]+$" version.out

      - name: Verify binary size (non-native arch — size only)
        if: matrix.smoke != true
        run: |
          binary="dist-binaries/foreman-${{ matrix.label }}"
          test -x "$binary"
          size_mb=$(stat -c%s "$binary")
          size_mb=$((size_mb / 1024 / 1024))
          echo "binary size: ${size_mb} MB"
          test "$size_mb" -lt 80

      - name: Upload binary as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: foreman-${{ matrix.label }}
          path: dist-binaries/foreman-${{ matrix.label }}

      - name: Attach binary to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            "dist-binaries/foreman-${{ matrix.label }}" \
            --clobber
