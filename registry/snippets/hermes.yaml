# Foreman wires Hermes through the MCP gateway so every outbound tool call is
# policy-checked and audited. Append this block to ~/.hermes/config.yaml.
mcp:
  enabled: true
  servers:
    foreman:
      command: foreman
      args: ["mcp-stdio", "--source", "hermes"]
      env:
        FOREMAN_AGENT_ID: hermes
secrets:
  source: foreman
  required:
    - anthropic-key
